<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Blocky Games</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}

h1{
    margin-top:20px;
}

.games{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    max-width:900px;
    margin:auto;
    margin-top:30px;
}

.game{
    background:#2b2b2b;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.game:hover{
    transform:scale(1.05);
}

.game img{
    width:100%;
    border-radius:8px;
}

.player{
    margin-top:40px;
    width:100%;
}

iframe{
    width:100%;
    height:600px;
    border:none;
    border-radius:10px;
}

/* Optioneel fullscreen styling */
.fullscreen {
    position: fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    z-index:1000;
    background:black;
}
</style>

<script>
function openGame(link){
    const iframe = document.getElementById("gameFrame");
    iframe.src = link;
    // Probeer fullscreen
    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen(); /* Safari */
    } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen(); /* IE11 */
    }
}
</script>

</head>
<body>

<h1>🎮 Blocky Games</h1>

<div class="games">
    <div class="game" onclick="openGame('https://slopeunblocked.netlify.app/')">
        <img src="<img src="https://www.slope-2.net/wp-content/uploads/thumbs/custom/S/slope.webp" alt="Slope Game | Play Slope Online!"/>" alt="Slope">
        <p>Slope</p>
    </div>

    <div class="game" onclick="openGame('https://slope2.io/')">
        <img src="https://i.imgur.com/wX0z9xU.png" alt="Slope 2">
        <p>Slope 2</p>
    </div>

    <div class="game" onclick="openGame('https://geometrydash.io/')">
        <img src="<img src="https://static.wikia.nocookie.net/logopedia/images/4/41/Geometry_Dash_Icon.svg/revision/latest?cb=20220220121501" alt="Geometry Dash | Logopedia | Fandom"/>" alt="Geometry Dash">
        <p>Geometry Dash</p>
    </div>

    <div class="game" onclick="openGame('https://asmallworldcup.com/play')">
        <img src="https://i.imgur.com/Nd9vE8G.png" alt="ASmallWorldCup">
        <p>ASmallWorldCup</p>
    </div>

    <div class="game" onclick="openGame('https://parkourblocks.io/')">
        <img src="https://parkourblocks.io/assets/images/icons/icon-72x72.png" alt="Parkour Blocks">
        <p>Parkour Blocks</p>
    </div>

    <div class="game" onclick="openGame('https://pacman.fun/')">
        <img src="https://pacman.fun/images/pacman-icon.png" alt="Pac‑Man">
        <p>Pac‑Man</p>
    </div>
</div>

<div class="player">
    <h2>🎮 Game laden</h2>
    <iframe id="gameFrame"></iframe>
</div>

</body>
</html>
